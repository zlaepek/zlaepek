name: Auto Update Profile

on:
  schedule:
    # 매일 한국시간 오전 9시 (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 가능
  workflow_run:
    workflows: ["Generate Language Trend Charts"]
    types:
      - completed

jobs:
  update-profile:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: |
          npm init -y
          npm install axios moment
          
      - name: Analyze GitHub Stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          cat > analyze-skills.js << 'EOF'
          const axios = require('axios');
          const moment = require('moment');
          const fs = require('fs');
          
          const GITHUB_TOKEN = process.env.GITHUB_TOKEN;
          const USERNAME = process.env.USERNAME;
          
          const headers = {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          };
          
          // 스킬 레벨 계산 함수
          function calculateLevel(bytes, commits) {
            const totalActivity = bytes / 1000 + commits * 10;
            return Math.min(99, Math.floor(Math.log2(totalActivity + 1) * 8));
          }
          
          // 진행률 바 생성 (shields.io 스타일)
          function createProgressBar(level) {
            const percentage = Math.min(100, level);
            let color = '90EE90'; // 기본 초록
            
            if (percentage >= 80) color = 'FFD700'; // 금색
            else if (percentage >= 60) color = 'C0C0C0'; // 은색  
            else if (percentage >= 40) color = 'CD7F32'; // 동색
            
            return `![Progress](https://img.shields.io/badge/Progress-${percentage}%25-${color}?style=flat&logo=chartdotjs&logoColor=white)`;
          }
          
          // 랭크 뱃지 결정
          function getRankBadge(level) {
            if (level >= 80) return {
              text: 'EXPERT',
              icon: '🥇',
              color: 'FFD700'
            };
            if (level >= 60) return {
              text: 'ADVANCED', 
              icon: '🥈',
              color: 'C0C0C0'
            };
            if (level >= 40) return {
              text: 'INTERMEDIATE',
              icon: '🥉', 
              color: 'CD7F32'
            };
            return {
              text: 'BEGINNER',
              icon: '🏅',
              color: '90EE90'
            };
          }
          
          // 스킬 레벨에 따른 텍스트 결정
          function getSkillLevel(level) {
            if (level >= 80) return 'Expert';
            if (level >= 60) return 'Advanced';
            if (level >= 40) return 'Intermediate';
            return 'Beginner';
          }
          
          async function getLanguageStats() {
            try {
              // 사용자의 모든 리포지토리 가져오기
              const reposResponse = await axios.get(
                `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`,
                { headers }
              );
              
              const repos = reposResponse.data.filter(repo => !repo.fork);
              const languageStats = {};
              
              // 각 리포지토리의 언어 통계 수집
              for (const repo of repos) {
                try {
                  const langResponse = await axios.get(
                    `https://api.github.com/repos/${USERNAME}/${repo.name}/languages`,
                    { headers }
                  );
                  
                  const languages = langResponse.data;
                  for (const [lang, bytes] of Object.entries(languages)) {
                    if (!languageStats[lang]) {
                      languageStats[lang] = { bytes: 0, repos: 0, commits: 0 };
                    }
                    languageStats[lang].bytes += bytes;
                    languageStats[lang].repos += 1;
                  }
                } catch (error) {
                  console.log(`언어 통계를 가져올 수 없음: ${repo.name}`);
                }
              }
              
              return languageStats;
            } catch (error) {
              console.error('언어 통계 가져오기 실패:', error.message);
              return {};
            }
          }
          
          async function getRecentActivity() {
            try {
              const response = await axios.get(
                `https://api.github.com/users/${USERNAME}/events?per_page=30`,
                { headers }
              );
              
              const events = response.data;
              const recentCommits = events
                .filter(event => event.type === 'PushEvent')
                .slice(0, 5)
                .map(event => ({
                  repo: event.repo.name,
                  message: event.payload.commits?.[0]?.message || 'No message',
                  date: moment(event.created_at).format('MM-DD')
                }));
              
              return recentCommits;
            } catch (error) {
              console.error('최근 활동 가져오기 실패:', error.message);
              return [];
            }
          }
          
          // 언어별 아이콘 및 색상 매핑
          const languageConfig = {
            'JavaScript': { icon: 'javascript', color: 'F7DF1E', logoColor: 'black' },
            'TypeScript': { icon: 'typescript', color: '3178C6', logoColor: 'white' },
            'Python': { icon: 'python', color: '3776AB', logoColor: 'white' },
            'Java': { icon: 'java', color: 'ED8B00', logoColor: 'white' },
            'C#': { icon: 'c-sharp', color: '239120', logoColor: 'white' },
            'Unity': { icon: 'unity', color: '000000', logoColor: 'white' },
            'React': { icon: 'react', color: '61DAFB', logoColor: 'black' },
            'Node.js': { icon: 'node.js', color: '339933', logoColor: 'white' },
            'AWS': { icon: 'amazon-aws', color: '232F3E', logoColor: 'white' },
            'Docker': { icon: 'docker', color: '2496ED', logoColor: 'white' },
            'HTML': { icon: 'html5', color: 'E34F26', logoColor: 'white' },
            'CSS': { icon: 'css3', color: '1572B6', logoColor: 'white' }
          };
          
          // 레포지토리별 언어 사용량과 프로젝트 매핑
          async function getLanguageWithRepos() {
            const languageStats = await getLanguageStats();
            const repoMapping = {};
            
            // 각 언어별로 사용된 레포지토리 목록 수집
            for (const [lang, stats] of Object.entries(languageStats)) {
              repoMapping[lang] = {
                ...stats,
                repos: stats.repos || [],
                recentActivity: await getRecentActivityByLanguage(lang)
              };
            }
            
            return repoMapping;
          }
          
          async function getRecentActivityByLanguage(language) {
            // 최근 3개월 커밋에서 해당 언어 사용률 계산
            // 가중치: 최근 3개월 70%, 이전 30%
            return Math.random() * 20 - 10; // 임시: -10% ~ +10% 변화율
          }
          
          async function updateSkillSection() {
            const languageStats = await getLanguageStats();
            
            // 언어별 통계를 레벨로 변환 (제외할 언어 필터링)
            const excludeLanguages = ['ShaderLab', 'HLSL', 'Makefile', 'Batchfile', 'Shell'];
            const skillsArray = Object.entries(languageStats)
              .filter(([name]) => !excludeLanguages.includes(name))
              .map(([name, stats]) => ({
                name,
                level: calculateLevel(stats.bytes, stats.repos),
                bytes: stats.bytes,
                repos: stats.repos
              }))
              .sort((a, b) => b.level - a.level)
              .slice(0, 8); // 상위 8개만 표시
            
            let skillsSection = '';
            
            if (skillsArray.length > 0) {
              // 테이블 시작
              skillsSection += '<div align="center">\n';
              skillsSection += '<table width="95%" style="margin: 0 auto; border-collapse: collapse;">\n';
              skillsSection += '  <thead>\n';
              skillsSection += '    <tr style="background-color: #f1f3f4;">\n';
              skillsSection += '      <th width="30%" style="padding: 12px; border: 1px solid #ddd; text-align: center;">기술 스택</th>\n';
              skillsSection += '      <th width="45%" style="padding: 12px; border: 1px solid #ddd; text-align: center;">숙련도</th>\n';
              skillsSection += '      <th width="25%" style="padding: 12px; border: 1px solid #ddd; text-align: center;">랭크</th>\n';
              skillsSection += '    </tr>\n';
              skillsSection += '  </thead>\n';
              skillsSection += '  <tbody>\n';
              
              // 각 스킬을 테이블 행으로 추가
              skillsArray.forEach(skill => {
                const config = languageConfig[skill.name] || { icon: skill.name.toLowerCase(), color: '666666', logoColor: 'white' };
                const rankBadge = getRankBadge(skill.level);
                
                const encodedName = encodeURIComponent(skill.name);
                const encodedRankText = encodeURIComponent(rankBadge.text);
                const encodedIcon = encodeURIComponent(rankBadge.icon);
                
                // 프로그레스 바 생성 (0-99 레벨을 0-100% 로 변환)
                const progressPercent = Math.min(100, skill.level);
                const progressColor = skill.level >= 70 ? 'FFD700' : skill.level >= 50 ? 'CD7F32' : 'C0C0C0';
                
                skillsSection += '    <tr style="border: 1px solid #ddd;">\n';
                skillsSection += `      <td style="padding: 10px; text-align: center;"><img src="https://img.shields.io/badge/${encodedName}-Lv${skill.level}-${config.color}?style=for-the-badge&logo=${config.icon}&logoColor=${config.logoColor}" alt="${skill.name}"/></td>\n`;
                skillsSection += `      <td style="padding: 10px; text-align: center;"><img src="https://img.shields.io/badge/Progress-${progressPercent}%25-${progressColor}?style=flat&logo=chartdotjs&logoColor=white" alt="Progress" height="20"/></td>\n`;
                skillsSection += `      <td style="padding: 10px; text-align: center;"><img src="https://img.shields.io/badge/${encodedIcon}-${encodedRankText}-${rankBadge.color}?style=for-the-badge&logoColor=white" alt="${rankBadge.text}" height="28"/></td>\n`;
                skillsSection += '    </tr>\n';
              });
              
              // 테이블 끝
              skillsSection += '  </tbody>\n';
              skillsSection += '</table>\n';
              skillsSection += '</div>\n';
            }
            
            return skillsSection;
          }
          
          async function updateWeeklyReport() {
            const recentActivity = await getRecentActivity();
            
            let weeklySection = '**이번 주 주력 분야:**  \n';
            weeklySection += '**Backend Development** (45%) - API 개발 및 최적화  \n';
            weeklySection += '**Business Strategy** (25%) - 기획, 팀 리딩  \n';
            weeklySection += '**Frontend** (20%) - UI/UX 개선  \n';
            weeklySection += '**DevOps** (10%) - 인프라 관리  \n\n';
            
            weeklySection += '**최근 활동:**  \n';
            recentActivity.forEach(commit => {
              weeklySection += `- \`${commit.repo}\`: ${commit.message} (${commit.date})  \n`;
            });
            
            return weeklySection;
          }
          
          async function updateActivitySection() {
            const recentActivity = await getRecentActivity();
            
            let activitySection = '**Recent Commits:**  \n';
            recentActivity.slice(0, 3).forEach(commit => {
              activitySection += `- \`${commit.repo}\`: ${commit.message}  \n`;
            });
            
            activitySection += '\n**This Month:**  \n';
            activitySection += `- ${recentActivity.length} commits across multiple repositories  \n`;
            activitySection += '- 새로운 기술 스택 학습 진행중  \n';
            activitySection += '- 프로젝트 마일스톤 달성  \n';
            
            return activitySection;
          }
          
          async function updateTechStackTrendTable() {
            const languageStats = await getLanguageStats();
            const excludeLanguages = ['ShaderLab', 'HLSL', 'Makefile', 'Batchfile', 'Shell'];
            
            // 언어들을 분야별로 그룹화
            const techStacks = {
              웹개발: { languages: ['JavaScript', 'HTML', 'CSS', 'React'], total: 0, growth: 45, logo: 'javascript', color: '4A90E2' },
              백엔드: { languages: ['Python', 'Java', 'Node.js'], total: 0, growth: 38, logo: 'python', color: 'F4A261' },
              TypeScript: { languages: ['TypeScript'], total: 0, growth: 28, logo: 'typescript', color: '3178C6' },
              게임개발: { languages: ['C#', 'Unity'], total: 0, growth: -32, logo: 'unity', color: 'E74C3C' }
            };
            
            // 각 분야별 사용량 계산
            Object.entries(languageStats).forEach(([lang, stats]) => {
              if (!excludeLanguages.includes(lang)) {
                Object.values(techStacks).forEach(stack => {
                  if (stack.languages.includes(lang)) {
                    stack.total += stats.bytes || 0;
                  }
                });
              }
            });
            
            // 테이블 생성
            let tableContent = '<table>\n';
            tableContent += '  <thead>\n';
            tableContent += '    <tr>\n';
            tableContent += '      <th align="center" width="120">분야</th>\n';
            tableContent += '      <th align="center" width="80">변화율</th>\n';
            tableContent += '      <th align="center" width="200">주요 기술</th>\n';
            tableContent += '      <th align="center" width="300">주요 프로젝트</th>\n';
            tableContent += '    </tr>\n';
            tableContent += '  </thead>\n';
            tableContent += '  <tbody>\n';
            
            // 사용량 순으로 정렬
            const sortedStacks = Object.entries(techStacks)
              .filter(([_, stack]) => stack.total > 0)
              .sort(([,a], [,b]) => b.total - a.total);
              
            sortedStacks.forEach(([name, stack]) => {
              const growthColor = stack.growth > 0 ? '#52b788' : '#e74c3c';
              const growthSign = stack.growth > 0 ? '+' : '';
              const description = getTechStackDescription(name);
              
              tableContent += '    <tr>\n';
              tableContent += `      <td align="center"><img src="https://img.shields.io/badge/${encodeURIComponent(name)}-${stack.color}?style=for-the-badge&logo=${stack.logo}&logoColor=white"/></td>\n`;
              tableContent += `      <td align="center"><span style="color: ${growthColor}; font-weight: bold;">${growthSign}${stack.growth}%</span></td>\n`;
              tableContent += `      <td align="center">${stack.languages.join(', ')}</td>\n`;
              tableContent += `      <td align="left">${description}</td>\n`;
              tableContent += '    </tr>\n';
            });
            
            tableContent += '  </tbody>\n';
            tableContent += '</table>';
            
            return tableContent;
          }
          
          function getTechStackDescription(stackName) {
            const descriptions = {
              '웹개발': 'PTAHLABS 웹사이트, 프로필 자동화',
              '백엔드': 'PTAHLABS API, 데이터 처리 시스템',
              'TypeScript': 'React 프로젝트, Node.js API',
              '게임개발': 'PTAHLABS 게임, VR/AR 프로젝트'
            };
            return descriptions[stackName] || '진행중인 프로젝트';
          }
          
          async function main() {
            console.log('프로필 업데이트 시작...');
            
            const [skillsContent, weeklyContent, activityContent, trendContent] = await Promise.all([
              updateSkillSection(),
              updateWeeklyReport(),
              updateActivitySection(),
              updateTechStackTrendTable()
            ]);
            
            // README 파일 읽기
            let readme = fs.readFileSync('README.md', 'utf8');
            
            // 각 섹션 업데이트
            readme = readme.replace(
              /<!-- TREND_START -->[\s\S]*?<!-- TREND_END -->/,
              `<!-- TREND_START -->\n${trendContent}\n<!-- TREND_END -->`
            );
            
            readme = readme.replace(
              /<!-- SKILL_START -->[\s\S]*?<!-- SKILL_END -->/,
              `<!-- SKILL_START -->\n${skillsContent}<!-- SKILL_END -->`
            );
            
            readme = readme.replace(
              /<!-- WEEKLY_START -->[\s\S]*?<!-- WEEKLY_END -->/,
              `<!-- WEEKLY_START -->\n${weeklyContent}<!-- WEEKLY_END -->`
            );
            
            readme = readme.replace(
              /<!-- ACTIVITY_START -->[\s\S]*?<!-- ACTIVITY_END -->/,
              `<!-- ACTIVITY_START -->\n${activityContent}<!-- ACTIVITY_END -->`
            );
            
            // 업데이트 시간 갱신
            const now = moment().utcOffset(9).format('YYYY-MM-DD HH:mm');
            readme = readme.replace(
              /<!-- UPDATE_TIME -->.*?<!-- \/UPDATE_TIME -->/,
              `<!-- UPDATE_TIME -->${now} KST<!-- /UPDATE_TIME -->`
            );
            
            // 파일 저장
            fs.writeFileSync('README.md', readme);
            console.log('프로필 업데이트 완료!');
          }
          
          main().catch(console.error);
          EOF
          
          node analyze-skills.js
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add README.md
          git diff --staged --quiet || git commit -m "Auto-update profile with latest stats"
          git push