name: Generate Language Trend Charts

on:
  schedule:
    # 매주 월요일 오전 9시 (일요일 UTC 24:00)
    - cron: '0 0 * * 1'
    # 매일 오전 8시 45분 (차트를 먼저 생성)
    - cron: '45 23 * * *'
  workflow_dispatch:

jobs:
  generate-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install matplotlib seaborn pandas requests python-dateutil
          
      - name: Generate Language Trend Charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          cat > generate_charts.py << 'EOF'
          import matplotlib.pyplot as plt
          import seaborn as sns
          import pandas as pd
          import requests
          import json
          from datetime import datetime, timedelta
          import os
          from collections import defaultdict
          import numpy as np
          
          # matplotlib 설정 - 폰트 문제 해결
          import matplotlib
          matplotlib.use('Agg')
          matplotlib.rcParams['axes.unicode_minus'] = False
          matplotlib.rcParams['font.family'] = 'DejaVu Sans'
          
          # GitHub API 설정
          GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
          USERNAME = os.environ['USERNAME']
          
          headers = {
              'Authorization': f'token {GITHUB_TOKEN}',
              'Accept': 'application/vnd.github.v3+json'
          }
          
          # 언어별 색상 매핑
          language_colors = {
              'JavaScript': '#f7df1e',
              'TypeScript': '#3178c6',
              'Python': '#3776ab',
              'Java': '#ed8b00',
              'C#': '#239120',
              'Unity': '#000000',
              'HTML': '#e34f26',
              'CSS': '#1572b6',
              'React': '#61dafb',
              'Vue': '#4fc08d',
              'PHP': '#777bb4',
              'Go': '#00add8',
              'Rust': '#dea584',
              'Swift': '#fa7343',
              'Kotlin': '#7f52ff'
          }
          
          def get_monthly_language_data():
              """지난 12개월간 언어별 사용률 데이터 수집"""
              print("📊 월별 언어 데이터 수집 시작...")
              
              # 지난 12개월 생성
              months = []
              current_date = datetime.now()
              for i in range(12):
                  month_date = current_date - timedelta(days=30*i)
                  months.append(month_date.strftime('%Y-%m'))
              months.reverse()
              
              # 새로운 데이터를 위해 기존 파일 삭제
              import os
              current_year = datetime.now().year
              
              for year in range(current_year - 3, current_year + 1):
                  filename = f'monthly_data_{year}.json'
                  if os.path.exists(filename):
                      os.remove(filename)
                      print(f"🗑️  기존 {year}년 데이터 파일 삭제")
              
              saved_data = {}
              
              # 월별 언어 데이터 저장
              monthly_data = defaultdict(lambda: defaultdict(int))
              
              try:
                  # 사용자의 모든 리포지토리 가져오기
                  repos_response = requests.get(
                      f'https://api.github.com/users/{USERNAME}/repos?per_page=100&sort=created',
                      headers=headers
                  )
                  repos = repos_response.json()
                  
                  # 모든 월에 대해 균등하게 데이터 배분
                  for repo in repos:
                      if repo['fork']:
                          continue
                          
                      print(f"분석 중: {repo['name']}")
                      
                      # 각 리포지토리의 언어 통계
                      try:
                          lang_response = requests.get(
                              f"https://api.github.com/repos/{USERNAME}/{repo['name']}/languages",
                              headers=headers
                          )
                          languages = lang_response.json()
                          
                          if languages:
                              # 리포지토리 생성일과 마지막 업데이트를 기준으로 활동 기간 계산
                              created_at = datetime.strptime(repo['created_at'], '%Y-%m-%dT%H:%M:%SZ')
                              updated_at = datetime.strptime(repo['updated_at'], '%Y-%m-%dT%H:%M:%SZ')
                              
                              # 리포지토리가 활동한 모든 월에 언어 데이터 추가
                              for month in months:
                                  month_date = datetime.strptime(month + '-01', '%Y-%m-%d')
                                  
                                  # 리포지토리가 해당 월에 존재했다면 데이터 추가
                                  if created_at <= month_date <= updated_at:
                                      total_bytes = sum(languages.values())
                                      
                                      # 시간에 따른 가중치 (최근일수록 높음)
                                      months_diff = (datetime.now() - month_date).days // 30
                                      weight = max(0.1, 1.0 - (months_diff * 0.05))  # 매월 5%씩 감소
                                      
                                      for lang, bytes_count in languages.items():
                                          percentage = (bytes_count / total_bytes * 100 * weight) if total_bytes > 0 else 0
                                          monthly_data[month][lang] += percentage
                                  
                      except Exception as e:
                          print(f"언어 데이터 가져오기 실패 {repo['name']}: {e}")
                          continue
                          
              except Exception as e:
                  print(f"리포지토리 데이터 가져오기 실패: {e}")
                  
              # 현재 월만 새로 수집 (기존 데이터 유지)
              current_month = datetime.now().strftime('%Y-%m')
              if current_month not in saved_data:
                  print(f"🔄 {current_month} 데이터 수집 중...")
                  # 현재 월 데이터만 수집
                  saved_data[current_month] = {}
              
              # 기존 데이터를 monthly_data로 복사
              for month in months:
                  if month in saved_data:
                      for lang, value in saved_data[month].items():
                          monthly_data[month][lang] = value
              
              # 데이터가 부족한 경우 샘플 데이터로 보완
              if len(monthly_data) < 6:  # 6개월 이하 데이터면 샘플 데이터 생성
                  print("⚠️  데이터가 부족해서 샘플 데이터로 차트 생성")
                  monthly_data = generate_sample_data(months)
              
              # 연도별로 데이터 분리 저장
              try:
                  years_data = {}
                  for month, data in monthly_data.items():
                      year = month.split('-')[0]
                      if year not in years_data:
                          years_data[year] = {}
                      years_data[year][month] = data
                  
                  # 각 연도별 파일로 저장
                  for year, year_data in years_data.items():
                      filename = f'monthly_data_{year}.json'
                      with open(filename, 'w') as f:
                          json.dump(year_data, f, indent=2)
                      print(f"💾 {year}년 데이터 저장 완료: {filename}")
                      
              except Exception as e:
                  print(f"⚠️  데이터 저장 실패: {e}")
              
              return months, monthly_data
          
          def generate_sample_data(months):
              """샘플 데이터 생성 (실제 데이터가 없을 때)"""
              languages = ['C#', 'JavaScript', 'Python', 'TypeScript', 'HTML', 'CSS']
              sample_data = defaultdict(lambda: defaultdict(int))
              
              # 당신의 실제 개발 히스토리를 반영한 패턴
              base_values = {
                  'C#': 80,      # Unity 시절 주력 언어
                  'JavaScript': 20, # 웹 개발 전환으로 증가
                  'Python': 10,  # PTAHLABS 창업으로 증가
                  'TypeScript': 5, # 최근 도입
                  'HTML': 15,    # 웹 개발과 함께 증가
                  'CSS': 10      # 웹 개발과 함께 증가
              }
              
              for i, month in enumerate(months):
                  # 2023년 이전 = 대학 시절, 2023-2024 = 디캐릭(Unity), 2024.11~ = PTAHLABS(웹)
                  year_month = month.split('-')
                  year = int(year_month[0])
                  month_num = int(year_month[1])
                  
                  for lang in languages:
                      base = base_values[lang]
                      
                      # 시기별 가중치 적용
                      if year <= 2022:  # 대학 시절
                          if lang == 'C#': value = base * 0.3  # 기초 학습
                          elif lang in ['Python', 'JavaScript']: value = base * 0.5
                          else: value = base * 0.2
                      elif year == 2023 or (year == 2024 and month_num <= 10):  # 디캐릭 시절
                          if lang == 'C#': value = base * 1.2  # Unity 개발
                          elif lang in ['JavaScript', 'HTML', 'CSS']: value = base * 0.3
                          else: value = base * 0.6
                      else:  # PTAHLABS 시절 (2024.11~)
                          if lang in ['JavaScript', 'Python', 'HTML', 'CSS']: value = base * 1.8
                          elif lang == 'TypeScript': value = base * 2.0  # 새로 도입
                          elif lang == 'C#': value = base * 0.6  # 비중 감소
                          else: value = base
                      
                      # 랜덤 변동 추가
                      noise = np.random.normal(0, 2)
                      final_value = max(5, min(95, value + noise))
                      
                      sample_data[month][lang] = final_value
              
              return sample_data
          
          def create_trend_chart(months, monthly_data):
              """언어 트렌드 차트 생성"""
              print("🎨 트렌드 차트 생성 중...")
              
              # 스타일 설정
              plt.style.use('dark_background')
              sns.set_palette("husl")
              
              fig, ax = plt.subplots(figsize=(12, 8))
              fig.patch.set_facecolor('#20232a')
              ax.set_facecolor('#20232a')
              
              # 주요 언어들만 선택 (데이터가 있는 언어들)
              all_languages = set()
              for month_data in monthly_data.values():
                  all_languages.update(month_data.keys())
              
              # 평균 사용률로 정렬해서 상위 5개 언어만
              lang_averages = {}
              for lang in all_languages:
                  values = [monthly_data[month].get(lang, 0) for month in months]
                  lang_averages[lang] = sum(values) / len(values)
              
              top_languages = sorted(lang_averages.items(), key=lambda x: x[1], reverse=True)[:5]
              
              # 각 언어별 선 그래프
              for lang, _ in top_languages:
                  values = [monthly_data[month].get(lang, 0) for month in months]
                  color = language_colors.get(lang, '#ffffff')
                  
                  ax.plot(range(len(months)), values, 
                         marker='o', linewidth=2.5, markersize=6,
                         label=lang, color=color, alpha=0.9)
              
              # 월 이름을 영어로 변환
              month_names = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                           'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
              
              # 차트 스타일링
              ax.set_xticks(range(len(months)))
              month_labels = []
              for month in months:
                  year, month_num = month.split('-')
                  month_name = month_names[int(month_num) - 1]
                  month_labels.append(f'{month_name} {year[2:]}')
              
              ax.set_xticklabels(month_labels, color='#ffffff', fontsize=10, rotation=45)
              ax.set_ylabel('Usage (%)', color='#52b788', fontsize=12, fontweight='bold')
              ax.set_title('📊 Programming Language Trends Over Time', color='#52b788', 
                          fontsize=16, fontweight='bold', pad=20)
              
              # 그리드 및 범례 개선
              ax.grid(True, alpha=0.2, color='#666666', linestyle='--', linewidth=0.5)
              ax.legend(loc='upper left', frameon=True, fancybox=True, 
                       shadow=True, ncol=1, fontsize=10, 
                       facecolor='#2a2a2a', edgecolor='#52b788', framealpha=0.9)
              
              # 축 색상
              ax.tick_params(axis='y', colors='#ffffff')
              ax.spines['bottom'].set_color('#555555')
              ax.spines['left'].set_color('#555555')
              ax.spines['top'].set_visible(False)
              ax.spines['right'].set_visible(False)
              
              # Y축 범위 설정
              ax.set_ylim(0, 100)
              
              plt.tight_layout()
              plt.savefig('language_trend_chart.png', dpi=300, bbox_inches='tight', 
                         facecolor='#20232a', edgecolor='none')
              plt.close()
              
              print("✅ 차트 생성 완료: language_trend_chart.png")
          
          def create_growth_chart(months, monthly_data):
              """성장률 차트 생성"""
              print("📈 성장률 차트 생성 중...")
              
              fig, ax = plt.subplots(figsize=(12, 6))
              fig.patch.set_facecolor('#20232a')
              ax.set_facecolor('#20232a')
              
              # 주요 언어들의 성장률 계산
              all_languages = set()
              for month_data in monthly_data.values():
                  all_languages.update(month_data.keys())
              
              growth_data = {}
              for lang in all_languages:
                  values = [monthly_data[month].get(lang, 0) for month in months]
                  if len(values) >= 2 and values[0] > 0:
                      growth_rate = ((values[-1] - values[0]) / values[0]) * 100
                      growth_data[lang] = growth_rate
              
              # 성장률 순으로 정렬
              sorted_growth = sorted(growth_data.items(), key=lambda x: x[1], reverse=True)[:8]
              
              languages = [item[0] for item in sorted_growth]
              growth_rates = [item[1] for item in sorted_growth]
              
              # 색상 설정 (그라데이션 효과)
              colors = []
              for rate in growth_rates:
                  if rate >= 30: colors.append('#FFD700')  # 금색
                  elif rate >= 0: colors.append('#52b788')  # 초록
                  elif rate >= -20: colors.append('#FFA500')  # 주황
                  else: colors.append('#e74c3c')  # 빨강
              
              bars = ax.barh(languages, growth_rates, color=colors, alpha=0.9, 
                           edgecolor='white', linewidth=0.5)
              
              # 바 위에 수치 표시 (더 예쁘게)
              for i, bar in enumerate(bars):
                  width = bar.get_width()
                  icon = '🚀' if width > 20 else '📈' if width >= 0 else '📉'
                  ax.text(width + (3 if width >= 0 else -3), bar.get_y() + bar.get_height()/2,
                         f'{icon} {growth_rates[i]:+.1f}%', ha='left' if width >= 0 else 'right',
                         va='center', color='white', fontweight='bold', fontsize=9)
              
              ax.set_xlabel('Growth Rate (%)', color='#52b788', fontsize=12, fontweight='bold')
              ax.set_title('📈 Language Growth Analysis (Year over Year)', color='#52b788', 
                          fontsize=16, fontweight='bold', pad=20)
              ax.axvline(0, color='#666666', linewidth=1.5, alpha=0.7)
              ax.grid(True, alpha=0.2, color='#666666', axis='x', linestyle='--', linewidth=0.5)
              
              # 축 색상
              ax.tick_params(axis='both', colors='#ffffff')
              ax.spines['bottom'].set_color('#555555')
              ax.spines['left'].set_color('#555555')
              ax.spines['top'].set_visible(False)
              ax.spines['right'].set_visible(False)
              
              plt.tight_layout()
              plt.savefig('language_growth_chart.png', dpi=300, bbox_inches='tight',
                         facecolor='#20232a', edgecolor='none')
              plt.close()
              
              print("✅ 성장률 차트 생성 완료: language_growth_chart.png")
          
          def main():
              print("🚀 언어 트렌드 차트 생성 시작...")
              
              months, monthly_data = get_monthly_language_data()
              
              if monthly_data:
                  create_trend_chart(months, monthly_data)
                  create_growth_chart(months, monthly_data)
                  
                  print("🎉 모든 차트 생성 완료!")
                  print("📁 생성된 파일:")
                  print("  - language_trend_chart.png")
                  print("  - language_growth_chart.png")
              else:
                  print("❌ 데이터를 가져올 수 없어서 차트 생성 실패")
          
          if __name__ == "__main__":
              main()
          EOF
          
          python generate_charts.py
          
      - name: Update README with Charts
        run: |
          # README에 차트 이미지 링크 업데이트
          if [ -f "language_trend_chart.png" ]; then
            # 이미지를 assets 폴더로 이동
            mkdir -p assets
            mv language_trend_chart.png assets/
            mv language_growth_chart.png assets/
            
            # README 업데이트
            sed -i 's|<!-- TREND_CHART -->.*<!-- /TREND_CHART -->|<!-- TREND_CHART -->\n![Language Trends](./assets/language_trend_chart.png)\n<!-- /TREND_CHART -->|g' README.md
            sed -i 's|<!-- GROWTH_CHART -->.*<!-- /GROWTH_CHART -->|<!-- GROWTH_CHART -->\n![Growth Chart](./assets/language_growth_chart.png)\n<!-- /GROWTH_CHART -->|g' README.md
            
            echo "✅ README 업데이트 완료"
          fi
          
      - name: Commit and Push Charts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add assets/ README.md monthly_data_*.json
          git diff --staged --quiet || git commit -m "Update language trend charts"
          git push